<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密音频振动分析仪// 初天博制作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary-color: #0f0;
            --dark-bg: #000;
            --panel-bg: rgba(10, 30, 10, 0.95);
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--primary-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 20px;
            background-color: rgba(15, 30, 15, 0.8);
            border-bottom: 1px solid #0a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        
        .title {
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--primary-color);
            letter-spacing: 1px;
        }
        
        .controls {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            background: linear-gradient(to bottom, #0a5, #083);
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover {
            background: linear-gradient(to bottom, #0c7, #0a5);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }
        
        .btn.active {
            background: linear-gradient(to bottom, #0c0, #0a0);
            box-shadow: 0 0 15px rgba(0, 255, 0, 1);
        }
        
        .btn i {
            font-size: 1.1rem;
        }
        
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }
        
        #oscilloscope {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 340px;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 20px;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            border-right: 1px solid #0a0;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            z-index: 100;
        }
        
        .settings-panel.active {
            transform: translateX(0);
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0a0;
        }
        
        .settings-title {
            font-size: 1.4rem;
            font-weight: bold;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.8rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }
        
        .close-btn:hover {
            background-color: rgba(0, 255, 0, 0.1);
        }
        
        .setting-group {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #083;
        }
        
        .setting-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .setting-title i {
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        
        .engine-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .engine-option {
            background-color: rgba(0, 30, 0, 0.6);
            border: 1px solid #083;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .engine-option:hover {
            background-color: rgba(0, 60, 0, 0.6);
            border-color: #0a5;
        }
        
        .engine-option.active {
            background-color: rgba(0, 100, 0, 0.6);
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .engine-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .engine-desc {
            font-size: 0.8rem;
            color: #8f8;
        }
        
        .slider-container {
            margin: 15px 0;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .slider-value {
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #083;
            border-radius: 4px;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #0f0;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background-color: rgba(0, 40, 0, 0.6);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background-color: rgba(0, 150, 0, 0.6);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }
        
        .mic-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: rgba(0, 30, 0, 0.6);
            border-radius: 5px;
            margin-top: 15px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #f00;
        }
        
        .status-indicator.active {
            background-color: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }
        
        .status-text {
            flex: 1;
        }
        
        .footer {
            padding: 12px 20px;
            background-color: rgba(15, 30, 15, 0.8);
            border-top: 1px solid #0a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        
        .frequency-display {
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 8px var(--primary-color);
            display: flex;
            gap: 15px;
        }
        
        .visualizer {
            display: flex;
            gap: 4px;
            height: 24px;
            align-items: flex-end;
        }
        
        .bar {
            width: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
            transition: height 0.1s ease;
        }
        
        .coords-display {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.85rem;
        }
        
        @media (max-width: 768px) {
            .settings-panel {
                width: 300px;
            }
            
            .title {
                font-size: 1.3rem;
            }
            
            .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .frequency-display {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">精密音频振动分析仪// 初天博制作</div>
        <div class="controls">
            <button id="settingsBtn" class="btn"><i>⚙️</i> 控制面板</button>
            <button id="micBtn" class="btn"><i>🎤</i> 启动麦克风</button>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="oscilloscope"></canvas>
        <div class="coords-display" id="coordsDisplay">X: 0, Y: 0, Hz: 0</div>
        
        <div id="settingsPanel" class="settings-panel">
            <div class="settings-header">
                <div class="settings-title">精密控制面板</div>
                <button id="closeSettings" class="close-btn">×</button>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">分析引擎</div>
                <div class="engine-options">
                    <div class="engine-option active" data-engine="waveform">
                        <div class="engine-name">波形引擎</div>
                        <div class="engine-desc">标准波形分析，适合通用场景</div>
                    </div>
                    <div class="engine-option" data-engine="spectrum">
                        <div class="engine-name">频谱引擎</div>
                        <div class="engine-desc">FFT频谱分析，适合精确测量</div>
                    </div>
                    <div class="engine-option" data-engine="freezeframe">
                        <div class="engine-name">冻结帧引擎</div>
                        <div class="engine-desc">暂停时完整保留波形状态</div>
                    </div>
                    <div class="engine-option" data-engine="particle">
                        <div class="engine-name"> </div>
                        <div class="engine-desc"></div>
                    </div>
                    <div class="engine-option" data-engine="rhythm">
                        <div class="engine-name"> </div>
                        <div class="engine-desc"></div>
                    </div>
                    <div class="engine-option" data-engine="harmonic">
                        <div class="engine-name"> </div>
                        <div class="engine-desc"></div>
                    </div>
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">帧率控制</div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>刷新间隔</span>
                        <span class="slider-value" id="intervalValue">0.1</span> 秒
                    </div>
                    <input type="range" min="1" max="20" value="10" class="slider" id="intervalSlider">
                </div>
                
                <div class="mode-selector">
                    <div class="mode-btn active" data-mode="realtime">实时模式</div>
                    <div class="mode-btn" data-mode="step">步进模式</div>
                    <div class="mode-btn" data-mode="freeze">冻结模式</div>
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">平滑控制</div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>延迟强度</span>
                        <span class="slider-value" id="smoothingValue">0.85</span>
                    </div>
                    <input type="range" min="70" max="99" value="85" class="slider" id="smoothingSlider">
                </div>
                
                <div class="slider-container">
                    <div class="slider-label">
                        <span>响应速度</span>
                        <span class="slider-value" id="responseValue">0.7</span>
                    </div>
                    <input type="range" min="1" max="10" value="7" class="slider" id="responseSlider">
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">麦克风状态</div>
                <div class="mic-status">
                    <div class="status-indicator" id="micIndicator"></div>
                    <div class="status-text" id="micStatusText">麦克风未激活</div>
                </div>
                <div class="mic-status">
                    <div class="status-text">采样率: <span id="sampleRate">0</span> Hz</div>
                </div>
                <div class="mic-status">
                    <div class="status-text">刷新延迟: <span id="latencyValue">0</span> ms</div>
                </div>
                <button id="testMicBtn" class="btn" style="width: 100%; margin-top: 10px;">测试麦克风</button>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="frequency-display">
            <span>频率: <span id="frequencyValue">0</span> Hz</span>
            <span>引擎: <span id="engineName">波形</span></span>
            <span>模式: <span id="modeName">实时</span></span>
        </div>
        <div class="visualizer" id="audioVisualizer"></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const canvas = document.getElementById('oscilloscope');
            const ctx = canvas.getContext('2d');
            const settingsBtn = document.getElementById('settingsBtn');
            const closeSettings = document.getElementById('closeSettings');
            const settingsPanel = document.getElementById('settingsPanel');
            const micBtn = document.getElementById('micBtn');
            const micIndicator = document.getElementById('micIndicator');
            const micStatusText = document.getElementById('micStatusText');
            const testMicBtn = document.getElementById('testMicBtn');
            const frequencyValue = document.getElementById('frequencyValue');
            const audioVisualizer = document.getElementById('audioVisualizer');
            const engineOptions = document.querySelectorAll('.engine-option');
            const engineName = document.getElementById('engineName');
            const sampleRateEl = document.getElementById('sampleRate');
            const latencyValue = document.getElementById('latencyValue');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const modeName = document.getElementById('modeName');
            
            // 获取滑块元素
            const intervalSlider = document.getElementById('intervalSlider');
            const intervalValue = document.getElementById('intervalValue');
            const smoothingSlider = document.getElementById('smoothingSlider');
            const smoothingValue = document.getElementById('smoothingValue');
            const responseSlider = document.getElementById('responseSlider');
            const responseValue = document.getElementById('responseValue');
            
            // 模式选择
            const modeBtns = document.querySelectorAll('.mode-btn');
            
            // 音频分析变量
            let audioContext;
            let analyser;
            let microphone;
            let isMicActive = false;
            let currentEngine = 'waveform';
            let currentMode = 'realtime';
            let animationId;
            let lastDrawTime = 0;
            let historyBuffer = [];
            const maxHistory = 50;
            let frozenFrame = null;
            let particles = [];
            const particleCount = 200;
            let isFrameFrozen = false;
            
            // 调整Canvas大小
            function resizeCanvas() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                initParticles();
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // 初始化粒子系统
            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 3 + 1,
                        speed: Math.random() * 2 + 0.5,
                        color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                        life: Math.random() * 100
                    });
                }
            }
            
            initParticles();
            
            // 设置面板控制
            settingsBtn.addEventListener('click', function() {
                settingsPanel.classList.add('active');
            });
            
            closeSettings.addEventListener('click', function() {
                settingsPanel.classList.remove('active');
            });
            
            // 引擎选择
            engineOptions.forEach(option => {
                option.addEventListener('click', function() {
                    engineOptions.forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    currentEngine = this.dataset.engine;
                    engineName.textContent = this.querySelector('.engine-name').textContent;
                    
                    if (currentEngine === 'particle') {
                        initParticles();
                    }
                });
            });
            
            // 模式选择
            modeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    modeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMode = this.dataset.mode;
                    modeName.textContent = this.textContent;
                    
                    if (currentMode === 'freeze') {
                        isFrameFrozen = true;
                    } else {
                        isFrameFrozen = false;
                    }
                });
            });
            
            // 滑块事件
            intervalSlider.addEventListener('input', function() {
                const value = this.value / 10;
                intervalValue.textContent = value.toFixed(1);
            });
            
            smoothingSlider.addEventListener('input', function() {
                const value = this.value / 100;
                smoothingValue.textContent = value.toFixed(2);
                if (analyser) {
                    analyser.smoothingTimeConstant = value;
                }
            });
            
            responseSlider.addEventListener('input', function() {
                const value = this.value / 10;
                responseValue.textContent = value.toFixed(1);
            });
            
            // 初始化音频可视化条
            function initVisualizer() {
                audioVisualizer.innerHTML = '';
                for (let i = 0; i < 64; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = '0px';
                    audioVisualizer.appendChild(bar);
                }
            }
            
            initVisualizer();
            
            // 麦克风控制
            micBtn.addEventListener('click', toggleMicrophone);
            
            // 测试麦克风
            testMicBtn.addEventListener('click', function() {
                if (isMicActive) {
                    playTestSound();
                } else {
                    toggleMicrophone();
                }
            });
            
            // 切换麦克风状态
            function toggleMicrophone() {
                if (isMicActive) {
                    stopMicrophone();
                } else {
                    startMicrophone();
                }
            }
            
            // 播放测试音
            function playTestSound() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                
                frequencyValue.textContent = '440';
                
                setTimeout(() => {
                    oscillator.stop();
                    frequencyValue.textContent = '0';
                }, 1000);
            }
            
            // 启动麦克风
            function startMicrophone() {
                if (!navigator.mediaDevices) {
                    updateMicStatus(false, "浏览器不支持麦克风");
                    return;
                }
                
                if (!audioContext) {
                    try {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        updateMicStatus(false, "无法创建音频上下文");
                        return;
                    }
                }
                
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(function(stream) {
                        microphone = audioContext.createMediaStreamSource(stream);
                        
                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 4096;
                        analyser.smoothingTimeConstant = parseFloat(smoothingValue.textContent);
                        
                        microphone.connect(analyser);
                        
                        isMicActive = true;
                        updateMicStatus(true, "麦克风已激活");
                        micBtn.innerHTML = '<i>🔴</i> 停止麦克风';
                        micBtn.classList.add('active');
                        
                        sampleRateEl.textContent = audioContext.sampleRate;
                        
                        if (animationId) {
                            cancelAnimationFrame(animationId);
                        }
                        draw();
                    })
                    .catch(function(err) {
                        updateMicStatus(false, "麦克风访问被拒绝: " + err.message);
                    });
            }
            
            // 停止麦克风
            function stopMicrophone() {
                if (microphone) {
                    try {
                        const tracks = microphone.mediaStream.getTracks();
                        tracks.forEach(track => track.stop());
                    } catch (e) {
                        console.error("停止麦克风时出错:", e);
                    }
                }
                
                if (analyser) {
                    try {
                        analyser.disconnect();
                    } catch (e) {
                        console.error("断开分析器时出错:", e);
                    }
                }
                
                isMicActive = false;
                updateMicStatus(false, "麦克风已停止");
                micBtn.innerHTML = '<i>🎤</i> 启动麦克风';
                micBtn.classList.remove('active');
                
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frequencyValue.textContent = "0";
                
                const bars = audioVisualizer.querySelectorAll('.bar');
                bars.forEach(bar => bar.style.height = '0px');
            }
            
            // 更新麦克风状态显示
            function updateMicStatus(active, text) {
                micIndicator.className = active ? 'status-indicator active' : 'status-indicator';
                micStatusText.textContent = text;
            }
            
            // 绘制波形
            function draw() {
                const now = Date.now();
                const interval = parseFloat(intervalValue.textContent) * 1000; // 转换为毫秒
                
                // 检查是否需要跳过此帧
                if (now - lastDrawTime < interval && currentMode !== 'step') {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                
                lastDrawTime = now;
                latencyValue.textContent = now - lastDrawTime;
                
                animationId = requestAnimationFrame(draw);
                
                // 清除画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (!analyser || !isMicActive) return;
                
                // 处理冻结帧模式
                if (currentMode === 'freeze' && frozenFrame) {
                    ctx.putImageData(frozenFrame, 0, 0);
                    return;
                }
                
                // 根据选择的引擎绘制
                switch(currentEngine) {
                    case 'waveform':
                        drawWaveform();
                        break;
                    case 'spectrum':
                        drawSpectrum();
                        break;
                    case 'freezeframe':
                        drawWaveform();
                        break;
                    case 'particle':
                        drawParticles();
                        break;
                    case 'rhythm':
                        drawRhythm();
                        break;
                    case 'harmonic':
                        drawHarmonic();
                        break;
                    default:
                        drawWaveform();
                }
                
                // 保存当前帧用于冻结模式
                if (currentEngine === 'freezeframe' || currentMode === 'freeze') {
                    frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                }
                
                // 更新可视化条
                updateVisualizer();
            }
            
            // 绘制波形引擎（带延迟）
            function drawWaveform() {
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteTimeDomainData(dataArray);
                
                // 添加到历史缓冲区
                historyBuffer.push([...dataArray]);
                if (historyBuffer.length > maxHistory) {
                    historyBuffer.shift();
                }
                
                // 应用延迟效果
                const delay = Math.floor(parseFloat(responseValue.textContent) * 10);
                const delayedIndex = Math.max(0, historyBuffer.length - delay);
                const delayedData = historyBuffer[delayedIndex] || dataArray;
                
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#0f0';
                
                const sliceWidth = canvas.width / bufferLength;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const v = delayedData[i] / 128.0;
                    const y = v * canvas.height / 2;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    
                    x += sliceWidth;
                }
                
                ctx.stroke();
                
                // 计算并显示主要频率
                const frequency = calculateFrequency(dataArray);
                frequencyValue.textContent = frequency;
            }
            
            // 绘制频谱引擎
            function drawSpectrum() {
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);
                
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#0f0';
                
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;
                let maxAmplitude = 0;
                let maxIndex = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i] / 2;
                    
                    // 检测最大振幅
                    if (barHeight > maxAmplitude) {
                        maxAmplitude = barHeight;
                        maxIndex = i;
                    }
                    
                    // 绘制频谱线
                    ctx.fillStyle = `rgba(0, 255, 0, ${barHeight / 100})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
                
                // 计算并显示主要频率
                const sampleRate = audioContext.sampleRate;
                const frequency = Math.round(maxIndex * sampleRate / analyser.fftSize);
                frequencyValue.textContent = frequency;
            }
            
            // 坐标跟踪
            canvas.addEventListener('mousemove', function(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 计算频率（简化版）
                const freq = Math.round((x / canvas.width) * (audioContext.sampleRate / 2));
                coordsDisplay.textContent = `X: ${x.toFixed(1)}, Y: ${y.toFixed(1)}, Hz: ${freq}`;
            });
            
            // 点击冻结/解冻画面
            canvas.addEventListener('click', function() {
                if (currentMode === 'freeze') {
                    isFrameFrozen = !isFrameFrozen;
                    modeName.textContent = isFrameFrozen ? '冻结' : '实时';
                } else if (currentMode === 'step') {
                    // 步进模式下点击触发下一帧
                    lastDrawTime = 0;
                }
            });
            
            // 计算主要频率（简化版）
            function calculateFrequency(dataArray) {
                let max = 0;
                let maxIndex = 0;
                
                for (let i = 0; i < dataArray.length; i++) {
                    if (dataArray[i] > max) {
                        max = dataArray[i];
                        maxIndex = i;
                    }
                }
                
                const sampleRate = audioContext ? audioContext.sampleRate : 44100;
                return Math.round(maxIndex * sampleRate / analyser.fftSize);
            }
            
            // 更新音频可视化条
            function updateVisualizer() {
                if (!analyser) return;
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);
                
                const bars = audioVisualizer.querySelectorAll('.bar');
                const barCount = bars.length;
                const groupSize = Math.floor(bufferLength / barCount);
                
                for (let i = 0; i < barCount; i++) {
                    let sum = 0;
                    
                    // 计算每个组内的平均值
                    for (let j = 0; j < groupSize; j++) {
                        sum += dataArray[(i * groupSize) + j];
                    }
                    
                    const average = sum / groupSize;
                    const barHeight = Math.max(1, average * 0.3);
                    
                    bars[i].style.height = barHeight + 'px';
                    bars[i].style.backgroundColor = `hsl(${i * 4}, 100%, 60%)`;
                }
            }
            
            // 初始状态
            updateMicStatus(false, "麦克风未激活");
        });
    </script>
</body>
</html>
